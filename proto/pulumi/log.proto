syntax = "proto3";

package pulumirpc;

option go_package = "github.com/pulumi/pulumi/sdk/v3/proto/go;pulumirpc";

import "google/protobuf/struct.proto";

// LogPropertyValue wraps a Pulumi property value for inclusion as a bytes
// attribute in an OTLP log record.  The sender proto-marshals this message
// and places the resulting bytes in an AnyValue.bytes_value attribute.
//
// The receiver can identify these values by attempting to unmarshal the bytes
// as a LogPropertyValue and checking that magic == 0x70756C756D695076
// (the ASCII string "pulumiPv" as a little-endian fixed64).
message LogPropertyValue {
  // Must be set to 0x70756C756D695076 ("pulumiPv" as little-endian uint64).
  // This allows the receiver to distinguish property values from arbitrary
  // binary data in log attributes.
  fixed64 magic = 1;

  // The property value encoded as a google.protobuf.Struct, using the
  // standard Pulumi secret signature convention (sig key
  // "4dabf18193072939515e22adb298388d") to mark secret values within.
  google.protobuf.Struct value = 2;
}
