syntax = "proto3";

package pulumirpc;

option go_package = "github.com/pulumi/pulumi/sdk/v3/proto/go;pulumirpc";

// PluginInfo is meta-information about a plugin that is used by the system.
message PluginInfo {
    string version = 1; // the semver for this plugin.
}

// PluginDependency is information about a plugin that a program may depend upon.
message PluginDependency {
    string name = 1;    // the name of the plugin.
    string kind = 2;    // the kind of plugin (e.g., language, etc).
    string version = 3; // the semver for this plugin.
    string server = 4; // the URL of a server that can be used to download this plugin, if needed.

    // a map of the checksums for the plugin, will be empty from old language runtimes. The keys should match
    // the os and architecture names used in pulumi releases, e.g. "darwin-amd64", "windows-arm64".
    map<string, bytes> checksums = 5;
}

// PluginAttach is used to attach an already running plugin to the engine.
//
// Normally the engine starts the plugin process itself and passes the engine address as the first argumnent.
// But when debugging it can be useful to have an already running provider that the engine instead attaches
// to, this message is used so the provider can still be passed the engine address to communicate with.
message PluginAttach {
    string address = 1; // the grpc address for the engine
}

message PackageParameterization {
    string name = 1; // the parameterized package name.
    string version = 2; // the parameterized package version.
    bytes value = 3; // the parameter value for the parameterized package.
}

// PackageDependency is information about a package that a program may depend upon.
message PackageDependency {
    string name = 1;    // the name of the plugin.
    string kind = 2;    // the kind of plugin (e.g., language, etc).
    string version = 3; // the semver for this plugin.
    string server = 4; // the URL of a server that can be used to download this plugin, if needed.

    // a map of the checksums for the plugin, will be empty from old language runtimes. The keys should match
    // the os and architecture names used in pulumi releases, e.g. "darwin-amd64", "windows-arm64".
    map<string, bytes> checksums = 5;

    // The optional parameterization for this package.
    PackageParameterization parameterization = 6;
}

message PackageSpec {
    // The "name" of the plugin.
    //
    // Source may be one of:
    // - A simple name, like "pkg"
    // - A registry double or triple: "org/pkg", "source/org/pkg"
    // - A git URL, "git://github.com/pulumi/pulumi-example/path"
    // - An un-prefixed URL, like github.com/pulumi/pulumi-example/path
    // - A local path, like /usr/bin/pkg
    string source = 1;
    // The version of the provider, may be Semver 2.0 or a git hash.
    string version = 2;
    // Any parameters needed to configure the package.
    repeated string parameters = 3;
    // if set will be used to validate the plugin downloaded matches. This is keyed by
    // "$os-$arch", e.g. "linux-x64".
    map<string, bytes> checksums = 4;
    string server = 5; // the URL of a server that can be used to download this plugin, if needed.
}

// PackageResolver is a service, hosted by the engine, that resolves a loosely-specified [](pulumirpc.PackageSpec) into
// a fully-resolved [](pulumirpc.PackageDependency). A `PackageSpec` may contain references that cannot be acted upon
// directly -- a registry reference such as `hashicorp/aws` paired with a version range such as `~>6.0`, or a Terraform
// module source, for instance. Resolution turns these into a concrete plugin (with a definite version and download
// location) and, where the spec carries parameters, runs parameterization so that the resulting parameterization
// *value* is baked into the result.
//
// Providers receive the address of a `PackageResolver` during [](pulumirpc.ResourceProvider.Handshake) so that they
// may resolve package references encountered while servicing later calls. This is what allows a provider serving a
// parameterized or dynamic package (e.g. Pulumi HCL bridging a Terraform module) to bake the packages it references
// while handling [](pulumirpc.ResourceProvider.Parameterize) and [](pulumirpc.ResourceProvider.Construct).
service PackageResolver {
    // ResolvePackage resolves a single [](pulumirpc.PackageSpec) to a concrete [](pulumirpc.PackageDependency).
    rpc ResolvePackage(ResolvePackageRequest) returns (ResolvePackageResponse) {}
}

// `ResolvePackageRequest` is the type of requests sent as part of a [](pulumirpc.PackageResolver.ResolvePackage) call.
message ResolvePackageRequest {
    // The package specification to resolve.
    PackageSpec spec = 1;
}

// `ResolvePackageResponse` is the type of responses sent by a [](pulumirpc.PackageResolver.ResolvePackage) call.
message ResolvePackageResponse {
    // The fully-resolved package, carrying the concrete plugin version and, where the spec was parameterized, the baked
    // parameterization value.
    PackageDependency package = 1;
}
