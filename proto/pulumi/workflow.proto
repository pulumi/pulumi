syntax = "proto3";

import "google/protobuf/struct.proto";

package pulumirpc;

option go_package = "github.com/pulumi/pulumi/sdk/v3/proto/go;pulumirpc";

// WorkflowEvaluator is called by a scheduler/coordinator to incrementally discover
// schema metadata and execute/materialize specific workflow callable nodes.
service WorkflowEvaluator {
    // `Handshake` is the first call made by the engine to a workflow evaluator. It is used to
    // pass the engine's address to the evaluator so that it may establish its own connections
    // back, and to establish protocol configuration that will be used to communicate between the
    // two parties.
    rpc Handshake(WorkflowHandshakeRequest) returns (WorkflowHandshakeResponse) {}

    // Returns high-level package metadata (name/version/display name/etc).
    rpc GetPackageInfo(GetPackageInfoRequest) returns (GetPackageInfoResponse) {}

    // Returns the list of exported graph tokens.
    rpc GetGraphs(GetGraphsRequest) returns (GetGraphsResponse) {}

    // Returns the schema for one exported graph.
    rpc GetGraph(GetGraphRequest) returns (GetGraphResponse) {}

    // Returns the list of exported trigger tokens.
    rpc GetTriggers(GetTriggersRequest) returns (GetTriggersResponse) {}

    // Returns the schema for one exported trigger.
    rpc GetTrigger(GetTriggerRequest) returns (GetTriggerResponse) {}

    // Returns the list of exported job tokens.
    rpc GetJobs(GetJobsRequest) returns (GetJobsResponse) {}

    // Returns the schema for one exported job.
    rpc GetJob(GetJobRequest) returns (GetJobResponse) {}

    // GenerateJob asks the evaluator to generate the job shape for a path.
    rpc GenerateJob(GenerateJobRequest) returns (GenerateNodeResponse) {}

    // GenerateGraph asks the evaluator to generate the graph/subgraph shape for a path.
    rpc GenerateGraph(GenerateGraphRequest) returns (GenerateNodeResponse) {}

    // RunSensor executes a sensor poll function and returns fire/skip plus cursor data.
    rpc RunSensor(RunSensorRequest) returns (RunSensorResponse) {}

    // RunStep executes a single step and returns a PropertyValue-compatible result.
    rpc RunStep(RunStepRequest) returns (RunStepResponse) {}

    // ResolveStepResult pushes a completed step result and resolved output value to the evaluator.
    rpc ResolveStepResult(ResolveStepResultRequest) returns (ResolveStepResultResponse) {}

    // RunTriggerMock executes a trigger mock function and returns a mock output value.
    rpc RunTriggerMock(RunTriggerMockRequest) returns (RunTriggerMockResponse) {}

    // RunFilter executes a trigger filter and returns pass/fail.
    rpc RunFilter(RunFilterRequest) returns (RunFilterResponse) {}

    // RunOnError executes a node's on-error callback and returns retry behavior.
    rpc RunOnError(RunOnErrorRequest) returns (RunOnErrorResponse) {}
}

// GraphMonitor is called while evaluating a concrete graph execution/generation.
// It records the graph shape for that evaluation and resolves prior node outputs.
service GraphMonitor {
    rpc RegisterTrigger(RegisterTriggerRequest) returns (RegisterNodeResponse) {}
    rpc RegisterSensor(RegisterSensorRequest) returns (RegisterNodeResponse) {}
    rpc RegisterJob(RegisterJobRequest) returns (RegisterNodeResponse) {}
    rpc RegisterGraph(RegisterGraphRequest) returns (RegisterNodeResponse) {}
    rpc RegisterStep(RegisterStepRequest) returns (RegisterNodeResponse) {}
}

// WorkflowContext identifies a workflow definition and execution.
message WorkflowContext {
    // The workflow execution identifier for a single trigger fire.
    string execution_id = 1;

    // A scheduler-defined immutable workflow version identifier. If empty, evaluators
    // should fall back to their own configured package/workflow version.
    string workflow_version = 2;
}

// `WorkflowHandshakeRequest` is the type of requests sent as part of a
// [](pulumirpc.WorkflowEvaluator.Handshake) call.
message WorkflowHandshakeRequest {
    // The gRPC address of the engine handshaking with the workflow evaluator. At a minimum, this
    // address will expose an instance of the [](pulumirpc.Engine) service.
    string engine_address = 1;

    // A *root directory* where the workflow program source is located. In the event that the
    // workflow evaluator is *not* being booted by the engine (e.g. in the case that the engine
    // has been asked to attach to an existing running workflow evaluator instance via a host/port
    // number), this field will be empty.
    optional string root_directory = 2;

    // A *program directory* in which the workflow evaluator should execute. This is generally a
    // subdirectory of the root directory, though this is not required. In the event that the
    // workflow evaluator is *not* being booted by the engine (e.g. in the case that the engine
    // has been asked to attach to an existing running workflow evaluator instance via a host/port
    // number), this field will be empty.
    optional string program_directory = 3;
}

// `WorkflowHandshakeResponse` is the type of responses sent by a
// [](pulumirpc.WorkflowEvaluator.Handshake) call.
message WorkflowHandshakeResponse {}

message TypeReference {
    // Package-qualified type token, e.g. workflow:index:TriggerInput.
    string token = 1;
}

message PackageInfo {
    string name = 1;
    string version = 2;
    string display_name = 3;
}

message GraphInfo {
    string token = 1;
    TypeReference input_type = 2;
    TypeReference output_type = 3;
    bool has_on_error = 4;
}

message JobInfo {
    string token = 1;
    TypeReference input_type = 2;
    TypeReference output_type = 3;
    bool has_on_error = 4;
}

message GetPackageInfoRequest {}
message GetPackageInfoResponse {
    PackageInfo package = 1;
}

message GetGraphsRequest {}
message GetGraphsResponse {
    repeated GraphInfo graphs = 1;
}

message GetGraphRequest {
    string token = 1;
}
message GetGraphResponse {
    GraphInfo graph = 1;
}

message GetTriggersRequest {}
message GetTriggersResponse {
    repeated string triggers = 1;
}

message GetTriggerRequest {
    string token = 1;
}
message GetTriggerResponse {
    TypeReference input_type = 1;
    TypeReference output_type = 2;
}

message GetJobsRequest {}
message GetJobsResponse {
    repeated JobInfo jobs = 1;
}

message GetJobRequest {
    string token = 1;
}
message GetJobResponse {
    JobInfo job = 1;
}

// WorkflowError represents an execution or generation error.
message WorkflowError {
    // A user-facing error message.
    string reason = 1;

    // Optional machine-friendly error category.
    string category = 2;

    // Optional extra structured details.
    google.protobuf.Struct details = 3;
}

// A dependency term can be a direct path or a nested dependency expression.
message DependencyTerm {
    oneof term {
        // A direct dependency on a concrete graph node path.
        string path = 1;

        // A nested dependency expression.
        DependencyExpression expression = 2;
    }
}

// DependencyExpression supports OR/strict compositions of dependencies.
message DependencyExpression {
    enum Operator {
        OPERATOR_UNSPECIFIED = 0;

        // All terms must be complete (default conjunction).
        OPERATOR_ALL = 1;

        // Any one term must be complete.
        OPERATOR_ANY = 2;

        // All terms must be complete and successful.
        OPERATOR_STRICT = 3;

        // All terms must be complete, ignoring strictness from enclosing scopes.
        OPERATOR_UNSTRICT = 4;
    }

    Operator operator = 1;
    repeated DependencyTerm terms = 2;
}

message PlatformRequirements {
    string os = 1;
    string arch = 2;
    int32 min_vcpu = 3;
    int32 min_memory_gib = 4;
}

message PlatformSelector {
    enum MatchPolicy {
        MATCH_POLICY_UNSPECIFIED = 0;
        MATCH_POLICY_EXACT = 1;
        MATCH_POLICY_CLOSEST = 2;
    }

    string target = 1;
    PlatformRequirements requirements = 2;
    MatchPolicy match_policy = 3;
}

message ErrorRecord {
    // Empty when the failure occurred during node generation instead of a concrete step.
    string step_path = 1;

    // Human-readable reason for the failure.
    string reason = 2;

    // Optional machine-friendly category.
    string category = 3;
}

message GenerateJobRequest {
    WorkflowContext context = 1;
    string path = 2;
    string graph_monitor_address = 3;
    string input_path = 4;
    google.protobuf.Value input_value = 5;
}

message GenerateGraphRequest {
    WorkflowContext context = 1;
    string path = 2;
    string graph_monitor_address = 3;
}

message GenerateNodeResponse {
    WorkflowError error = 1;
}

message RunSensorRequest {
    WorkflowContext context = 1;
    string path = 2;

    // Last persisted sensor cursor.
    google.protobuf.Value cursor = 3;
}

message RunSensorResponse {
    enum Decision {
        DECISION_UNSPECIFIED = 0;
        DECISION_SKIP = 1;
        DECISION_FIRE = 2;
    }

    // Non-empty error indicates poll failure.
    WorkflowError error = 1;

    // Whether this poll cycle should create a workflow execution.
    Decision decision = 2;

    // Updated cursor to persist before the next poll.
    google.protobuf.Value cursor = 3;

    // Trigger payload emitted when decision is FIRE.
    google.protobuf.Value event = 4;

    // Optional scheduler hint for next poll cadence (e.g. "30s").
    string next_interval = 5;
}

message RunStepRequest {
    WorkflowContext context = 1;
    string path = 2;
}

message RunStepResponse {
    WorkflowError error = 1;
    google.protobuf.Value result = 2;
}

message StepResult {
    enum Status {
        STATUS_UNSPECIFIED = 0;
        STATUS_PASSED = 1;
        STATUS_FAILED = 2;
    }

    string step_path = 1;
    Status status = 2;
    int64 started_at_unix_millis = 3;
    int64 finished_at_unix_millis = 4;
    string reason = 5;
}

message ResolveStepResultRequest {
    WorkflowContext context = 1;
    StepResult step = 2;
    google.protobuf.Value result = 3;
}

message ResolveStepResultResponse {
    WorkflowError error = 1;
}

message RunTriggerMockRequest {
    string token = 1;
    repeated string args = 2;
}

message RunTriggerMockResponse {
    google.protobuf.Struct value = 1;
}

message RunFilterRequest {
    string path = 1;
    google.protobuf.Value value = 2;
}

message RunFilterResponse {
    bool pass = 1;
}

message RunOnErrorRequest {
    WorkflowContext context = 1;
    string path = 2;
    repeated ErrorRecord errors = 3;
}

message RunOnErrorResponse {
    WorkflowError error = 1;

    // True when execution should be retried.
    bool retry = 2;

    // Optional scheduler hint for how long to delay before retrying (e.g. "250ms").
    string retry_after = 3;
}

message RegisterTriggerRequest {
    WorkflowContext context = 1;
    string path = 2;

    // Trigger type token, e.g. cloud:github:push.
    string type = 3;

    // Scheduler-owned declarative trigger specification.
    google.protobuf.Struct spec = 4;

    // If true, trigger has a filter function that can be executed via RunFilter.
    bool has_filter = 5;
}

message RegisterSensorRequest {
    WorkflowContext context = 1;
    string path = 2;

    // Declarative sensor polling specification.
    google.protobuf.Struct spec = 3;

    // Nominal polling interval used by the scheduler.
    string interval = 4;
}

message RegisterJobRequest {
    WorkflowContext context = 1;
    string path = 2;
    DependencyExpression dependencies = 3;
    PlatformSelector platform = 4;
    bool has_on_error = 5;
}

message RegisterGraphRequest {
    WorkflowContext context = 1;
    string path = 2;
    DependencyExpression dependencies = 3;
    bool has_on_error = 4;
}

message RegisterStepRequest {
    WorkflowContext context = 1;
    string name = 2;
    string job = 3;
    DependencyExpression dependencies = 4;
    bool has_on_error = 5;
}

message RegisterNodeResponse {
    // Current state for the node if known in the provided execution state.
    google.protobuf.Value value = 1;
}
