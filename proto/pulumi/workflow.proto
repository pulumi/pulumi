syntax = "proto3";

import "google/protobuf/struct.proto";

package pulumirpc;

option go_package = "github.com/pulumi/pulumi/sdk/v3/proto/go;pulumirpc";

// WorkflowEvaluator is the execution-side contract implemented by workflow language hosts/plugins.
//
// A scheduler/engine uses this service in three phases:
// 1. Handshake and schema discovery (`Get*` methods).
// 2. Shape generation (`GenerateGraph` / `GenerateJob`) while the plugin calls back into GraphMonitor.
// 3. Runtime execution (`Run*` methods), including individual step execution and final job result resolution.
//
// The design is intentionally incremental:
// - The scheduler does not fetch "everything" up front.
// - The evaluator materializes only the graph/job currently being examined.
// - Step execution and final job output evaluation are separate operations.
service WorkflowEvaluator {
    // `Handshake` is the first call made by the engine to a workflow evaluator. It is used to
    // pass the engine's address to the evaluator so that it may establish its own connections
    // back, and to establish protocol configuration that will be used to communicate between the
    // two parties.
    rpc Handshake(WorkflowHandshakeRequest) returns (WorkflowHandshakeResponse) {}

    // Returns high-level package metadata (name/version/display name/etc).
    //
    // This is analogous to package identity APIs in provider/language protocols and is expected
    // to be stable for a plugin process lifetime.
    rpc GetPackageInfo(GetPackageInfoRequest) returns (GetPackageInfoResponse) {}

    // Returns the list of exported graph tokens.
    //
    // This should include only top-level exported graphs, not inline subgraphs.
    rpc GetGraphs(GetGraphsRequest) returns (GetGraphsResponse) {}

    // Returns schema metadata for one exported graph token.
    rpc GetGraph(GetGraphRequest) returns (GetGraphResponse) {}

    // Returns the list of exported trigger tokens.
    rpc GetTriggers(GetTriggersRequest) returns (GetTriggersResponse) {}

    // Returns schema metadata for one exported trigger token.
    rpc GetTrigger(GetTriggerRequest) returns (GetTriggerResponse) {}

    // Returns the list of exported top-level job tokens.
    rpc GetJobs(GetJobsRequest) returns (GetJobsResponse) {}

    // Returns schema metadata for one exported job token.
    rpc GetJob(GetJobRequest) returns (GetJobResponse) {}

    // Returns the list of exported step tokens.
    //
    // These are reusable top-level step definitions that can be referenced from jobs.
    rpc GetSteps(GetStepsRequest) returns (GetStepsResponse) {}

    // Returns schema metadata for one exported step token.
    rpc GetStep(GetStepRequest) returns (GetStepResponse) {}

    // Generates a concrete job shape for either:
    // - an exported top-level job (`name`), or
    // - an inline graph-scoped job (`path`).
    //
    // During this call, the evaluator registers jobs/steps/dependencies by calling GraphMonitor.
    // No steps are executed here; this is shape/materialization only.
    rpc GenerateJob(GenerateJobRequest) returns (GenerateNodeResponse) {}

    // Generates the concrete graph shape for `path`.
    //
    // During this call, the evaluator registers graph children (triggers/jobs/subgraphs) by
    // calling GraphMonitor. This call does not execute steps.
    rpc GenerateGraph(GenerateGraphRequest) returns (GenerateNodeResponse) {}

    // Executes one sensor poll cycle.
    //
    // The scheduler supplies the persisted cursor, and the evaluator returns:
    // - whether to fire an execution,
    // - the next cursor to persist,
    // - and optional emitted event payload.
    rpc RunSensor(RunSensorRequest) returns (RunSensorResponse) {}

    // Executes one concrete step instance identified by `path`.
    //
    // This is the unit of work the scheduler retries when step-level retry policy allows.
    rpc RunStep(RunStepRequest) returns (RunStepResponse) {}

    // Evaluates and returns the resolved value of a job's declared Output[T] result expression.
    //
    // This is intentionally separate from RunStep:
    // - RunStep yields per-step outputs.
    // - ResolveJobResult yields the overall job output value after all required steps finish.
    rpc ResolveJobResult(ResolveJobResultRequest) returns (ResolveJobResultResponse) {}

    // Executes a trigger's mock function for scheduler-side simulation/testing.
    //
    // Args are scheduler-provided string inputs interpreted by trigger-specific logic.
    rpc RunTriggerMock(RunTriggerMockRequest) returns (RunTriggerMockResponse) {}

    // Evaluates a filter callback for a previously registered node path.
    //
    // Used for trigger/job/step filter semantics. The scheduler is responsible for deciding
    // when to call it and what value to pass.
    rpc RunFilter(RunFilterRequest) returns (RunFilterResponse) {}

    // Executes a node-level on-error callback and returns retry guidance.
    //
    // The scheduler still decides max attempts and retry timing policy; this RPC returns
    // evaluator/user-code intent for the current failure history.
    rpc RunOnError(RunOnErrorRequest) returns (RunOnErrorResponse) {}
}

// GraphMonitor is the scheduler-side callback service used during `GenerateGraph`/`GenerateJob`.
//
// The evaluator calls this service to register concrete nodes discovered during generation.
// Registration order is meaningful for execution ordering semantics where applicable.
service GraphMonitor {
    // Registers a trigger node at a concrete path.
    rpc RegisterTrigger(RegisterTriggerRequest) returns (RegisterNodeResponse) {}
    // Registers a sensor node at a concrete path.
    rpc RegisterSensor(RegisterSensorRequest) returns (RegisterNodeResponse) {}
    // Registers a job node at a concrete path.
    rpc RegisterJob(RegisterJobRequest) returns (RegisterNodeResponse) {}
    // Registers a graph/subgraph node at a concrete path.
    rpc RegisterGraph(RegisterGraphRequest) returns (RegisterNodeResponse) {}
    // Registers a step node under a concrete job path.
    rpc RegisterStep(RegisterStepRequest) returns (RegisterNodeResponse) {}
}

// WorkflowContext identifies a workflow definition and execution.
message WorkflowContext {
    // The workflow execution identifier for a single trigger fire.
    string execution_id = 1;

    // A scheduler-defined immutable workflow version identifier. If empty, evaluators
    // should fall back to their own configured package/workflow version.
    string workflow_version = 2;
}

// `WorkflowHandshakeRequest` is the type of requests sent as part of a
// [](pulumirpc.WorkflowEvaluator.Handshake) call.
message WorkflowHandshakeRequest {
    // The gRPC address of the engine handshaking with the workflow evaluator. At a minimum, this
    // address will expose an instance of the [](pulumirpc.Engine) service.
    string engine_address = 1;

    // A *root directory* where the workflow program source is located. In the event that the
    // workflow evaluator is *not* being booted by the engine (e.g. in the case that the engine
    // has been asked to attach to an existing running workflow evaluator instance via a host/port
    // number), this field will be empty.
    optional string root_directory = 2;

    // A *program directory* in which the workflow evaluator should execute. This is generally a
    // subdirectory of the root directory, though this is not required. In the event that the
    // workflow evaluator is *not* being booted by the engine (e.g. in the case that the engine
    // has been asked to attach to an existing running workflow evaluator instance via a host/port
    // number), this field will be empty.
    optional string program_directory = 3;
}

// `WorkflowHandshakeResponse` is the type of responses sent by a
// [](pulumirpc.WorkflowEvaluator.Handshake) call.
message WorkflowHandshakeResponse {}

message TypeReference {
    // Package-qualified type token, e.g. workflow:index:TriggerInput.
    string token = 1;
}

message PackageInfo {
    // Package name (e.g. "example").
    string name = 1;
    // Semantic version string for this package (e.g. "1.2.3").
    string version = 2;
    // Human-readable name for UIs/CLIs.
    string display_name = 3;
}

message GraphInfo {
    // Fully-qualified graph token.
    string token = 1;
    // Type token for graph input shape.
    TypeReference input_type = 2;
    // Type token for graph output shape.
    TypeReference output_type = 3;
    // Whether graph defines an on-error callback.
    bool has_on_error = 4;
}

message JobInfo {
    // Fully-qualified job token.
    string token = 1;
    // Type token for job input shape.
    TypeReference input_type = 2;
    // Type token for job output shape.
    TypeReference output_type = 3;
    // Whether job defines an on-error callback.
    bool has_on_error = 4;
}

message GetPackageInfoRequest {}
message GetPackageInfoResponse {
    // Package metadata.
    PackageInfo package = 1;
}

message GetGraphsRequest {}
message GetGraphsResponse {
    // Exported graph definitions.
    repeated GraphInfo graphs = 1;
}

message GetGraphRequest {
    // Fully-qualified graph token to fetch.
    string token = 1;
}
message GetGraphResponse {
    // Graph metadata for the requested token.
    GraphInfo graph = 1;
}

message GetTriggersRequest {}
message GetTriggersResponse {
    // Fully-qualified trigger tokens.
    repeated string triggers = 1;
}

message GetTriggerRequest {
    // Fully-qualified trigger token to fetch.
    string token = 1;
}
message GetTriggerResponse {
    // Type token for trigger input args shape.
    TypeReference input_type = 1;
    // Type token for trigger output/event shape.
    TypeReference output_type = 2;
}

message GetJobsRequest {}
message GetJobsResponse {
    // Exported job definitions.
    repeated JobInfo jobs = 1;
}

message GetJobRequest {
    // Fully-qualified job token to fetch.
    string token = 1;
}
message GetJobResponse {
    // Job metadata for the requested token.
    JobInfo job = 1;
    // Input object fields accepted by this job.
    repeated InputProperty input_properties = 2;
}

message GetStepsRequest {}
message GetStepsResponse {
    // Fully-qualified exported step tokens.
    repeated string steps = 1;
}

message GetStepRequest {
    // Fully-qualified step token to fetch.
    string token = 1;
}
message GetStepResponse {
    // Type token for step input value shape.
    TypeReference input_type = 1;
    // Type token for step output value shape.
    TypeReference output_type = 2;
}

message InputProperty {
    // Field name on the job input object.
    string name = 1;
    // Primitive type for CLI coercion (string, integer, number, boolean).
    string type = 2;
    // True when callers must provide this field.
    bool required = 3;
    // Optional human-readable description.
    string description = 4;
}

// WorkflowError represents an execution or generation error.
message WorkflowError {
    // A user-facing error message.
    string reason = 1;

    // Optional machine-friendly error category.
    string category = 2;

    // Optional extra structured details.
    google.protobuf.Struct details = 3;
}

// A dependency term can be a direct path or a nested dependency expression.
message DependencyTerm {
    oneof term {
        // A direct dependency on a concrete graph node path.
        string path = 1;

        // A nested dependency expression.
        DependencyExpression expression = 2;
    }
}

// DependencyExpression describes readiness rules over dependency paths/expressions.
//
// Schedulers evaluate this expression to decide when a node is runnable.
message DependencyExpression {
    enum Operator {
        OPERATOR_UNSPECIFIED = 0;

        // All terms must be complete (default conjunction).
        OPERATOR_ALL = 1;

        // Any one term must be complete.
        OPERATOR_ANY = 2;

        // All terms must be complete and successful.
        OPERATOR_STRICT = 3;

        // All terms must be complete, ignoring strictness from enclosing scopes.
        OPERATOR_UNSTRICT = 4;
    }

    // Operator applied to all terms below.
    Operator operator = 1;
    // Child terms participating in this expression.
    repeated DependencyTerm terms = 2;
}

message PlatformRequirements {
    // Preferred/required operating system.
    string os = 1;
    // Preferred/required architecture.
    string arch = 2;
    // Minimum virtual CPUs required.
    int32 min_vcpu = 3;
    // Minimum memory in GiB required.
    int32 min_memory_gib = 4;
}

message PlatformSelector {
    enum MatchPolicy {
        MATCH_POLICY_UNSPECIFIED = 0;
        MATCH_POLICY_EXACT = 1;
        MATCH_POLICY_CLOSEST = 2;
    }

    // Named scheduler target/pool (if supported by runtime).
    string target = 1;
    // Hardware/OS constraints for matching.
    PlatformRequirements requirements = 2;
    // Matching strategy for target/requirements.
    MatchPolicy match_policy = 3;
}

message ErrorRecord {
    // Empty when the failure occurred during node generation instead of a concrete step.
    string step_path = 1;

    // Human-readable reason for the failure.
    string reason = 2;

    // Optional machine-friendly category.
    string category = 3;
}

message GenerateJobRequest {
    // Execution context for this materialization.
    WorkflowContext context = 1;
    // Name/token of an exported top-level job.
    // Must be set when generating a top-level exported job.
    string name = 2;
    // Full path to a graph-scoped inline job (for example: graph/jobs/main).
    // Must be set for inline jobs, and for exported jobs this is the runtime path where that
    // exported job is being materialized in the current graph execution.
    string path = 3;
    // Scheduler-hosted GraphMonitor address used for node registration callbacks.
    string graph_monitor_address = 4;
    // Resolved input object associated with `path`.
    //
    // Jobs only accept struct-like inputs (record/object shape), so this is a Struct instead of
    // a generic Value.
    google.protobuf.Struct input_value = 5;
}

message GenerateGraphRequest {
    // Execution context for this materialization.
    WorkflowContext context = 1;
    // Concrete graph/subgraph path to generate.
    string path = 2;
    // Scheduler-hosted GraphMonitor address used for node registration callbacks.
    string graph_monitor_address = 3;
}

message GenerateNodeResponse {
    // Non-empty on generation/materialization failure.
    WorkflowError error = 1;
}

message RunSensorRequest {
    // Execution context.
    WorkflowContext context = 1;
    // Sensor node path.
    string path = 2;

    // Last persisted sensor cursor.
    google.protobuf.Value cursor = 3;
}

message RunSensorResponse {
    enum Decision {
        DECISION_UNSPECIFIED = 0;
        DECISION_SKIP = 1;
        DECISION_FIRE = 2;
    }

    // Non-empty error indicates poll failure.
    WorkflowError error = 1;

    // Whether this poll cycle should create a workflow execution.
    Decision decision = 2;

    // Updated cursor to persist before the next poll.
    google.protobuf.Value cursor = 3;

    // Trigger payload emitted when decision is FIRE.
    google.protobuf.Value event = 4;

    // Optional scheduler hint for next poll cadence (e.g. "30s").
    string next_interval = 5;
}

message RunStepRequest {
    // Execution context.
    WorkflowContext context = 1;
    // Step node path.
    string path = 2;
    // Optional input value for this step invocation.
    google.protobuf.Value input = 3;
}

message RunStepResponse {
    // Non-empty on step execution failure.
    WorkflowError error = 1;
    // Step return value encoded as PropertyValue.
    google.protobuf.Value result = 2;
}

message ResolveJobResultRequest {
    // Execution context.
    WorkflowContext context = 1;
    // Job path whose final Output result should be resolved.
    string path = 2;
}

message ResolveJobResultResponse {
    // Non-empty on job result resolution failure.
    WorkflowError error = 1;
    // Resolved job output encoded as PropertyValue.
    google.protobuf.Value result = 2;
}

message RunTriggerMockRequest {
    // Fully-qualified trigger token.
    string token = 1;
    // Trigger-specific string arguments.
    repeated string args = 2;
}

message RunTriggerMockResponse {
    // Structured trigger output payload.
    google.protobuf.Struct value = 1;
}

message RunFilterRequest {
    // Node path whose filter callback should be evaluated.
    string path = 1;
    // Candidate input value supplied to the filter.
    google.protobuf.Value value = 2;
}

message RunFilterResponse {
    bool pass = 1;
}

message RunOnErrorRequest {
    // Execution context.
    WorkflowContext context = 1;
    // Node path whose on-error callback should be evaluated.
    string path = 2;
    // Ordered failure history (oldest -> newest).
    repeated ErrorRecord errors = 3;
}

message RunOnErrorResponse {
    WorkflowError error = 1;

    // True when execution should be retried.
    bool retry = 2;

    // Optional scheduler hint for how long to delay before retrying (e.g. "250ms").
    string retry_after = 3;
}

message RegisterTriggerRequest {
    // Execution context for this registration.
    WorkflowContext context = 1;
    // Concrete trigger path in the generated graph.
    string path = 2;

    // Trigger type token, e.g. cloud:github:push.
    string type = 3;

    // Scheduler-owned declarative trigger specification.
    google.protobuf.Struct spec = 4;

    // If true, trigger has a filter function that can be executed via RunFilter.
    bool has_filter = 5;
}

message RegisterSensorRequest {
    // Execution context for this registration.
    WorkflowContext context = 1;
    // Concrete sensor path in the generated graph.
    string path = 2;

    // Declarative sensor polling specification.
    google.protobuf.Struct spec = 3;

    // Nominal polling interval used by the scheduler.
    string interval = 4;
}

message RegisterJobRequest {
    // Execution context for this registration.
    WorkflowContext context = 1;
    // Concrete job path in the generated graph.
    string path = 2;
    // Job readiness dependencies.
    DependencyExpression dependencies = 3;
    // Optional platform selector for scheduling placement.
    PlatformSelector platform = 4;
    // Whether this job has an on-error callback callable via RunOnError.
    bool has_on_error = 5;
}

message RegisterGraphRequest {
    // Execution context for this registration.
    WorkflowContext context = 1;
    // Concrete graph/subgraph path.
    string path = 2;
    // Graph readiness dependencies.
    DependencyExpression dependencies = 3;
    // Whether this graph has an on-error callback callable via RunOnError.
    bool has_on_error = 4;
}

message RegisterStepRequest {
    // Execution context for this registration.
    WorkflowContext context = 1;
    // Step name relative to its parent job.
    string name = 2;
    // Parent job path.
    string job = 3;
    // Step readiness dependencies.
    DependencyExpression dependencies = 4;
    // Whether this step has an on-error callback callable via RunOnError.
    bool has_on_error = 5;
}

message RegisterNodeResponse {
    // Current state for the node if known in the provided execution state.
    google.protobuf.Value value = 1;
}
