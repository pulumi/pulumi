run: |
  esc env webhook new test-user/default/src deploy --url https://example.invalid/hook --event created --event updated
  esc env webhook list test-user/default/src
  esc env webhook ls test-user/default/src
  esc env webhook get test-user/default/src hook-1
  esc env webhook edit test-user/default/src hook-1 --active=false
  esc env webhook get test-user/default/src hook-1
  esc env webhook ping test-user/default/src hook-1
  esc env webhook delivery list test-user/default/src hook-1 --utc
  esc env webhook delivery ls test-user/default/src hook-1 --utc
  esc env webhook rm test-user/default/src hook-1
  esc env webhook list test-user/default/src
environments:
  test-user/default/src:
    yaml:
      values: {}

