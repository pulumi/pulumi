run: |
  esc env webhook get test-user/default/src deploy
  esc env webhook edit test-user/default/src deploy --add-event rotated --remove-event created
  esc env webhook get test-user/default/src deploy
environments:
  test-user/default/src:
    yaml:
      values: {}
    webhooks:
      - name: deploy
        display-name: deploy
        payload-url: https://example.invalid/hook
        active: true
        format: raw
        filters:
          - created
          - updated

---
