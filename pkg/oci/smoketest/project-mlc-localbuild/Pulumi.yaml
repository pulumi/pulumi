name: oci-smoketest-mlc-localbuild
description: Local-component build — the OCI language host builds the MLC image itself, then a Go program consumes it
runtime:
  name: oci
  options:
    image: oci-smoke-mlc:latest
    # The greeting component is *local*: its source is here, not a published image. The
    # program only names the local component PATHS; each component describes its own
    # name/version/build in its PulumiPlugin.yaml. InstallDependencies builds each via the
    # same mechanism as `pulumi package build` (oci.BuildPackage), tagging by the provider
    # convention so the container host resolves the just-built image at Construct time —
    # i.e. `install` is a caller of the build phase, not a hand-roller of it.
    components:
      - component-greeter
