# The policy pack's runtime manifest — the analyzer analogue of Pulumi.yaml. It
# declares `runtime: oci`, so the engine's container host runs this pack as a
# container from the named image instead of spawning it via a language plugin. The
# pack's code lives in the image; only this manifest needs to be reachable in the
# engine container (mounted), exactly like Pulumi.yaml for a program.
runtime:
  name: oci
  options:
    image: oci-smoke-policy:latest
