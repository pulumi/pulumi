name: oci-package-add
description: Smoke test for `pulumi package add oci://<ref>` (schema-from-image + codegen delegation + build-owned link)
runtime:
  name: oci
  options:
    # The dev-language axis: the OCI host delegates SDK *generation* (GeneratePackage) to
    # pulumi-language-<language>. runtime: oci is only how the program *runs*.
    language: go
    # Linking is BUILD-OWNED: the OCI host runs build.link in build.image (which carries the
    # toolchain/package manager), handing it the generated SDK path via $PULUMI_LINK_SDK_PATHS.
    # A real template would `go mod edit -replace`; here we write a receipt proving the command
    # ran in the Go toolchain image (absent from the alpine engine) and saw the SDK path.
    build:
      image: golang:alpine
      link: |
        echo "go: $(go version)" > LINK_RECEIPT
        echo "sdk: $PULUMI_LINK_SDK_PATHS" >> LINK_RECEIPT
