name: ${PROJECT}
description: ${DESCRIPTION}
runtime:
  name: oci
  options:
    # The program's source language. runtime: oci is how the program *runs* (as a
    # container); `language` is the separate dev axis — the OCI host delegates SDK
    # generation (`pulumi package add`) to pulumi-language-nodejs.
    language: nodejs
    # How to build the PROGRAM image. The build runs in build.image (a builder that
    # carries the docker CLI), turning the Dockerfile in this directory into a runnable
    # image. The Dockerfile, its base image, and the bootstrap entrypoint are all yours
    # to edit — the only contract is that the container runs the program when started.
    build:
      image: docker:cli
      command: docker build -q .
    # How to wire a generated SDK (`pulumi package add`) into the program. This is
    # DECLARE-ONLY: it adds a `file:` dependency to package.json; the program image build
    # (npm install, above) materializes it. Because link only declares — it does not install
    # — link.image just needs *a* package manager, NOT the exact toolchain the build uses
    # (that runs at build time). Avoid an *installing* command (`npm add`): it would drag the
    # build's toolchain and installed state back in. The OCI host runs this once per added
    # package, with $PULUMI_LINK_SDK_NAME / $PULUMI_LINK_SDK_PATH in the environment.
    link:
      image: node:20-alpine
      command: |
        # Use the SDK's own package name (so a scoped name like @scope/pkg works), and add
        # it as a file: dependency. `npm pkg set` edits package.json without installing.
        name=$(node -p "require('./$PULUMI_LINK_SDK_PATH/package.json').name")
        npm pkg set "dependencies.$name=file:./$PULUMI_LINK_SDK_PATH"
