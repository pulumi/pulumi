name: ${PROJECT}
description: ${DESCRIPTION}
runtime:
  name: oci
  options:
    # The program's source language. runtime: oci is how the program *runs* (as a
    # container); `language` is the separate dev axis — the OCI host delegates SDK
    # generation (`pulumi package add`) to pulumi-language-nodejs.
    language: nodejs
    # How to build the PROGRAM image. The build runs in build.image (a builder that
    # carries the docker CLI), turning the Dockerfile in this directory into a runnable
    # image. The Dockerfile, its base image, and the bootstrap entrypoint are all yours
    # to edit — the only contract is that the container runs the program when started.
    build:
      image: docker:cli
      command: docker build -q .
    # How to wire a generated SDK (`pulumi package add`) into the program. This is
    # DECLARE-ONLY: it adds a `file:` dependency to package.json (and the lockfile); the
    # program image build (npm install, above) MATERIALIZES it. Because link only declares —
    # `--package-lock-only` skips the node_modules install — link.image just needs *a*
    # package manager, NOT the exact toolchain the build uses (that runs at build time).
    # Avoid a plain installing `npm add`: it would drag the build's toolchain/state back in.
    # The OCI host runs this once per added package, with $PULUMI_LINK_SDK_NAME /
    # $PULUMI_LINK_SDK_PATH in the environment (npm derives the package name from the SDK).
    link:
      image: node:20-alpine
      command: npm add --save --package-lock-only "./$PULUMI_LINK_SDK_PATH"
