[tools]
github-cli = "2.93.0"
"go:github.com/go-delve/delve/cmd/dlv" = "1.26.3"
"go:golang.org/x/tools/gopls" = "0.22.0"
go = "1.26"
changie = "1.24.2"
golangci-lint = "2.12.2"
jq = "1.8.1"
node = "22"
"npm:pnpm" = "11"
"npm:typescript" = "6.0.3"
"npm:typescript-language-server" = "5.3.0"
"npm:yarn" = "1.22.22"
bun = "1.3.14"
python = '3.11'
uv = "0.11.28"
# This is a dev only dependency that fails to install on windows
"go:github.com/mitranim/gow" = { version = "0.0.0-20260515002309-3b8e4d082711", os = ["linux", "macos"] }
protoc = "29.5"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "v1.36.6"
"go:google.golang.org/grpc/cmd/protoc-gen-go-grpc" = "v1.5.1"
"npm:grpc-tools" = { version = "1.13.0", npm_args = "--ignore-scripts=false" }
"npm:grpc_tools_node_protoc_ts" = "5.3.3"
# This is a dev only dependency that fails to install on windows
"npm:protoc-gen-js" = { version = "3.21.4", os = ["linux", "macos"], npm_args = "--ignore-scripts=false" }
"go:go.abhg.dev/requiredfield/cmd/requiredfield" = "0.8.0"
"github:WebAssembly/wabt" = "1.0.37"
dotnet = "8"
java = "temurin-11"
gradle = "7.6"
"github:pulumi/goteststats" = "0.0.7"

[env]
PULUMI_TEST_USE_NPM = "true"

[tool_alias]
protoc = "asdf:https://github.com/paxosglobal/asdf-protoc"

[plugins]
protoc = "https://github.com/paxosglobal/asdf-protoc"
gradle = "https://github.com/rfrancis/asdf-gradle"
