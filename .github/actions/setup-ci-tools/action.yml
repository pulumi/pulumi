name: Setup CI Tools
description: >
  Installs all CI tools via Nix from the flake.nix ci-tools packages.
  On Windows, falls back to traditional GitHub Actions setup.

inputs:
  version-set:
    description: 'Version set name: "current" or "minimum"'
    required: false
    default: "current"
  go-version:
    description: "Go version (used for Windows fallback)"
    required: false
    default: "1.25"
  python-version:
    description: "Python version (used for Windows fallback)"
    required: false
    default: "3.11"
  node-version:
    description: "Node.js version (used for Windows fallback)"
    required: false
    default: "20"
  dotnet-version:
    description: ".NET version (used for Windows fallback)"
    required: false
    default: "8"

runs:
  using: composite
  steps:
    # --- Linux / macOS: use Nix ---
    - name: Install Nix
      if: runner.os != 'Windows'
      uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    - name: Add CI tools to PATH
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "$(nix build .#ci-tools-${{ inputs.version-set }} --print-out-paths)/bin" >> "$GITHUB_PATH"
        # Ensure go install targets (e.g. requiredfield) are on PATH
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        # Nix Node has a read-only npm prefix. Set writable locations for
        # npm/yarn global installs and caches so tests can install packages.
        NPM_DIR="$HOME/.npm-global"
        mkdir -p "$NPM_DIR"
        npm config set prefix "$NPM_DIR"
        echo "$NPM_DIR/bin" >> "$GITHUB_PATH"
        echo "NPM_CONFIG_PREFIX=$NPM_DIR" >> "$GITHUB_ENV"

    # --- Windows: traditional setup actions ---
    - name: Set up Go (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
    - name: Set up Python (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Set up Node (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
    - name: Set up DotNet (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
    - name: Set up JDK 11 (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-java@v5
      with:
        java-version: "11"
        distribution: "temurin"
    - name: Setup Gradle (Windows)
      if: runner.os == 'Windows'
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: "7.6"
    - name: Set up uv (Windows)
      if: runner.os == 'Windows'
      uses: astral-sh/setup-uv@v7
    - name: Install Windows tools
      if: runner.os == 'Windows'
      shell: bash
      run: |
        npm install -g yarn pnpm@10
        python -m pip install --upgrade pip poetry
        go install github.com/go-delve/delve/cmd/dlv@latest
    - name: Install bun (Windows)
      if: runner.os == 'Windows'
      uses: oven-sh/setup-bun@v2
    - name: Install gotestsum (Windows)
      if: runner.os == 'Windows'
      uses: jaxxstorm/action-install-gh-release@v3.0.0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        repo: gotestyourself/gotestsum
        tag: v1.8.1
        cache: enable
    - name: Install goteststats (Windows)
      if: runner.os == 'Windows'
      uses: jaxxstorm/action-install-gh-release@v3.0.0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        repo: pulumi/goteststats
        tag: v0.0.7
        cache: enable
