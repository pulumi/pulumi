name: Merge

permissions:
  # To create a draft release.
  contents: write
  # To sign artifacts.
  id-token: write

on:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  info:
    name: info
    uses: ./.github/workflows/ci-info.yml
    permissions:
      contents: read
    with:
      ref: ${{ github.ref }}
      is-snapshot: false
    secrets: inherit

  ci:
    name: CI
    needs: [info]
    uses: ./.github/workflows/ci.yml
    strategy:
      fail-fast: true
    permissions:
      contents: read
      # To sign artifacts.
      id-token: write
    with:
      ref: ${{ github.ref }}
      version: ${{ needs.info.outputs.version }}
      enable-coverage: true
      fail-fast: true
      test-retries: 2
      acceptance-test-platforms: 'macos-latest'
      fuzz-test-optional: true
    secrets: inherit

  performance-gate:
    name: Performance Gate
    needs: [info]
    uses: ./.github/workflows/ci-performance-gate.yml
    strategy:
      fail-fast: true
    permissions:
      contents: read
    with:
      ref: ${{ github.ref }}
      version: ${{ needs.info.outputs.version }}
      test-version-sets: 'minimum current'
      fail-fast: true
      test-retries: 2
      performance-test-platforms: ubuntu-latest
    secrets: inherit

  prepare-release:
    name: prepare
    needs: [info, ci]
    uses: ./.github/workflows/ci-prepare-release.yml
    permissions:
      contents: write
      # To sign artifacts.
      id-token: write
    with:
      ref: ${{ github.ref }}
      version: ${{ needs.info.outputs.version }}
      release-notes: ${{ needs.info.outputs.release-notes }}
      project: ${{ github.repository }}
    secrets: inherit

  block-during-release:
    name: block during release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # To cancel sibling jobs (ci, performance-gate, prepare-release) so the
      # merge queue rejects this PR without waiting for the full test suite.
      actions: write
      # To comment on the blocked PR explaining the release hold.
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check release marker
        id: check
        env:
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          set -euo pipefail
          git fetch --depth=1 origin master
          git fetch --depth=2 origin "$BASE_SHA"

          # No release in progress - nothing to enforce.
          if ! git cat-file -e origin/master:.release-pending 2>/dev/null &&
              ! git cat-file -e "$BASE_SHA":.release-pending 2>/dev/null; then
            exit 0
          fi

          # Release in progress. The marker must be gone after this PR.
          if [ -f .release-pending ]; then
            echo "release-in-progress=true" >> "$GITHUB_OUTPUT"
            echo "::error::A release is in progress (.release-pending exists)."
            echo "Only the post-release changelog/go.mod PR can merge until the marker is removed."
            exit 1
          fi

          # The marker is gone in this PR's tree. The merge queue merges all PRs
          # when the last one in the queue is green. So we need to specifically check
          # that the changelog/go.mod update PR is merged right after the freeze PR.
          # We do this by checking that the merge base is the freeze commit and otherwise
          # fail, by checking that it added the .release-pending file, and checking that
          # its sdk/.version matches the sdk/v3 version this PR now depends on in its pkg/go.mod
          #
          # The merge queue will kick out PRs in order, from the earliest failing one, so it'll
          # kick out all of the PRs before the changelog/go.mod update PR.
          if ! git cat-file -e "$BASE_SHA":.release-pending 2>/dev/null; then
            echo "::error::The merge base ($BASE_SHA) does not contain .release-pending."
            echo "This PR is not stacked directly on the freeze commit."
            exit 1
          fi
          if git cat-file -e "$BASE_SHA^":.release-pending 2>/dev/null; then
            echo "::error::The merge base ($BASE_SHA) did not introduce .release-pending - it was already present in its parent."
            echo "Another commit slipped between the freeze and this PR."
            exit 1
          fi

          EXPECTED_VERSION=$(git show "$BASE_SHA^":sdk/.version | tr -d '[:space:]')
          DEPENDED_VERSION=$(awk '$1 == "github.com/pulumi/pulumi/sdk/v3" && $2 ~ /^v[0-9]/ {print $2; exit}' pkg/go.mod | sed 's/^v//')
          if [ -z "$DEPENDED_VERSION" ]; then
            echo "::error::Could not read the github.com/pulumi/pulumi/sdk/v3 dependency from pkg/go.mod."
            exit 1
          fi
          if [ "$EXPECTED_VERSION" != "$DEPENDED_VERSION" ]; then
            echo "::error::Version mismatch between the freeze commit's sdk/.version and this PR's pkg/go.mod dependency:"
            echo "  sdk/.version at merge base: $EXPECTED_VERSION"
            echo "  pkg/go.mod sdk/v3:          $DEPENDED_VERSION"
            exit 1
          fi
      - name: Comment on blocked PR
        if: ${{ failure() && steps.check.outputs.release-in-progress == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail

          # The merge queue ref looks like:
          #   gh-readonly-queue/master/pr-23690-<sha>
          # Pull the PR number out of it. When several PRs are batched, only the
          # last one is named here; the queue re-forms groups as it kicks PRs
          # out, so each lands at the head of a group and gets commented in turn.
          PR=$(printf '%s' "$HEAD_REF" | sed -n 's#.*/pr-\([0-9]\+\)-.*#\1#p')
          if [ -z "$PR" ]; then
            echo "Could not determine a PR number from head ref: $HEAD_REF"
            exit 0
          fi

          # Don't comment twice - PRs get re-queued (and re-blocked) repeatedly.
          MARKER="<!-- release-block -->"
          if gh pr view "$PR" --repo "$REPO" --json comments \
              --jq '.comments[].body' 2>/dev/null | grep -qF "$MARKER"; then
            echo "Already commented on #$PR"
            exit 0
          fi

          # Find the open finalizing PR by its predictable title. master's
          # sdk/.version holds the version being released while the marker is set.
          VERSION=$(git show origin/master:sdk/.version 2>/dev/null | tr -d '[:space:]')
          FINALIZE_URL=""
          if [ -n "$VERSION" ]; then
            FINALIZE_URL=$(gh pr list --repo "$REPO" --state open \
              --search "\"Changelog and go.mod updates for v${VERSION}\" in:title" \
              --json url --jq '.[0].url // empty')
          fi

          LINK="Wait for the in-progress release to finalize, then re-queue this PR."
          if [ -n "$FINALIZE_URL" ]; then
            LINK="Once the release is finalized (${FINALIZE_URL}), re-queue this PR."
          fi

          gh pr comment "$PR" --repo "$REPO" --body "$MARKER
          🚧 This PR was held out of the merge queue because a Pulumi release is in progress. The queue is temporarily closed to everything except the post-release changelog/go.mod update.

          ${LINK}"

      - name: Cancel sibling jobs on block
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}"

  ci-ok:
    name: ci-ok
    needs: [ci, performance-gate, prepare-release, block-during-release]
    if: always() # always report a status
    runs-on: ubuntu-latest
    steps:
      - name: Release in progress
        if: ${{ needs.block-during-release.result != 'success' }}
        run: exit 1
      - name: CI failed
        if: ${{ needs.ci.result != 'success' }}
        run: exit 1
      - name: Release failed
        if: ${{ needs.prepare-release.result != 'success' }}
        run: exit 1
      - name: CI succeeded
        run: exit 0
