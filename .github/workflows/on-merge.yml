name: Merge

permissions:
  # To create a draft release.
  contents: write
  # To sign artifacts.
  id-token: write

on:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  info:
    name: info
    uses: ./.github/workflows/ci-info.yml
    permissions:
      contents: read
    with:
      ref: ${{ github.ref }}
      is-snapshot: false
    secrets: inherit

  ci:
    name: CI
    needs: [info]
    uses: ./.github/workflows/ci.yml
    strategy:
      fail-fast: true
    permissions:
      contents: read
      # To sign artifacts.
      id-token: write
    with:
      ref: ${{ github.ref }}
      version: ${{ needs.info.outputs.version }}
      enable-coverage: true
      fail-fast: true
      test-retries: 2
      acceptance-test-platforms: 'macos-latest'
      fuzz-test-optional: true
    secrets: inherit

  performance-gate:
    name: Performance Gate
    needs: [info]
    uses: ./.github/workflows/ci-performance-gate.yml
    strategy:
      fail-fast: true
    permissions:
      contents: read
    with:
      ref: ${{ github.ref }}
      version: ${{ needs.info.outputs.version }}
      test-version-sets: 'minimum current'
      fail-fast: true
      test-retries: 2
      performance-test-platforms: ubuntu-latest
    secrets: inherit

  prepare-release:
    name: prepare
    needs: [info, ci]
    uses: ./.github/workflows/ci-prepare-release.yml
    permissions:
      contents: write
      # To sign artifacts.
      id-token: write
    with:
      ref: ${{ github.ref }}
      version: ${{ needs.info.outputs.version }}
      release-notes: ${{ needs.info.outputs.release-notes }}
      project: ${{ github.repository }}
    secrets: inherit

  block-during-release:
    name: block during release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check release marker
        run: |
          set -euo pipefail
          git fetch --depth=1 origin master
          # The marker is dropped by scripts/set-version.py in the freeze PR and
          # removed by the post-release changelog/go.mod PR. Any merge_group ref
          # that still carries the marker after master has it is something other
          # than that post-release PR, so block it.
          if git cat-file -e origin/master:.release-pending 2>/dev/null \
              && [ -f .release-pending ]; then
            echo "::error::A release is in progress (.release-pending exists)."
            echo "Only the post-release changelog/go.mod PR can merge until the marker is removed."
            exit 1
          fi

  ci-ok:
    name: ci-ok
    needs: [ci, performance-gate, prepare-release, block-during-release]
    if: always() # always report a status
    runs-on: ubuntu-latest
    steps:
      - name: CI failed
        if: ${{ needs.ci.result != 'success' }}
        run: exit 1
      - name: Release failed
        if: ${{ needs.prepare-release.result != 'success' }}
        run: exit 1
      - name: Release in progress
        if: ${{ needs.block-during-release.result != 'success' }}
        run: exit 1
      - name: CI succeeded
        run: exit 0
