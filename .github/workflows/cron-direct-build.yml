name: Direct build

on:
  schedule:
  # 1030 UTC every weekday
  - cron: "30 10 * * 1-5"

jobs:
  pkg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
      - uses: ./.github/actions/retry
        with:
          action: jdx/mise-action@v2
          with: |
            experimental: true
      - name: Build
        shell: bash
        run: |
          # Fetching dependencies directly from their origin (GOPROXY=direct)
          # is more prone to transient network failures, so retry.
          retry() {
            local attempt=1 max=5
            while true; do
              "$@" && return 0
              if [ "$attempt" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt/$max failed: $*; retrying in 15s..." >&2
              attempt=$((attempt + 1))
              sleep 15
            done
          }
          retry env GOPROXY=direct SDKS="" make build
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"

      - uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          pulumi-version: dev

      - name: Build
        shell: bash
        run: |
          # Fetching dependencies directly from their origin (GOPROXY=direct)
          # is more prone to transient network failures, so retry.
          retry() {
            local attempt=1 max=5
            while true; do
              "$@" && return 0
              if [ "$attempt" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt/$max failed: $*; retrying in 15s..." >&2
              attempt=$((attempt + 1))
              sleep 15
            done
          }
          mkdir test
          cd test
          pulumi new random-go --generate-only --yes
          go mod edit -replace github.com/pulumi/pulumi/sdk/v3=../sdk
          retry env GOPROXY=direct pulumi install
