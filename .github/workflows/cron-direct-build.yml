name: Direct build

on:
  schedule:
  # 1030 UTC every weekday
  - cron: "30 10 * * 1-5"

jobs:
  pkg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: ./.github/actions/retry
        with:
          action: jdx/mise-action@v2
          with: |
            experimental: true
      - name: Build
        shell: bash
        run: |
          # Fetching dependencies directly from their origin (GOPROXY=direct)
          # is more prone to transient network failures, so retry.
          retry() {
            local attempt=1 max=5
            while true; do
              "$@" && return 0
              if [ "$attempt" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt/$max failed: $*; retrying in 15s..." >&2
              attempt=$((attempt + 1))
              sleep 15
            done
          }
          retry env GOPROXY=direct SDKS="" make build
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7
        with:
          pulumi-version: dev

      - name: Build
        shell: bash
        run: |
          # Fetching dependencies directly from their origin (GOPROXY=direct)
          # is more prone to transient network failures, so retry.
          retry() {
            local attempt=1 max=5
            while true; do
              "$@" && return 0
              if [ "$attempt" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt/$max failed: $*; retrying in 15s..." >&2
              attempt=$((attempt + 1))
              sleep 15
            done
          }
          mkdir test
          cd test
          pulumi new random-go --generate-only --yes
          go mod edit -replace github.com/pulumi/pulumi/sdk/v3=../sdk
          retry env GOPROXY=direct pulumi install
