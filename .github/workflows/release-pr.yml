name: Post-Release PR

permissions:
  # To create a PR
  contents: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      ref:
        required: true
        description: "GitHub ref to use"
        type: string
      version:
        required: true
        description: "Version to produce"
        type: string
      branch_from_ref:
        required: false
        description: "Commit to branch from, if not the tag"
        type: string
      release-notes:
        required: true
        description: "Release notes to publish"
        type: string
      queue-merge:
        required: false
        default: false
        description: "Whether to queue the release for immediate merge"
        type: boolean

jobs:
  version-bump:
    name: version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
      - name: Install changie
        run: |
          CHANGIE_VERSION="1.21.0"
          curl -sSL "https://github.com/miniscruff/changie/releases/download/v${CHANGIE_VERSION}/changie_${CHANGIE_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin changie
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: sdk/go.mod
      - name: Create PR
        env:
          PULUMI_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
          QUEUE_MERGE: ${{ inputs.queue-merge }}
          GITHUB_TOKEN: ${{ secrets.PULUMI_BOT_TOKEN }}
        run: |
          set -euo pipefail
          git switch --create "automation/release-v${PULUMI_VERSION}"

          # Batch pending entries and merge into CHANGELOG.md.
          # changie batch moves pending/ fragments into a versioned file
          # and changie merge prepends it to CHANGELOG.md.
          changie batch "${PULUMI_VERSION}"
          changie merge

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add -A
          git commit -m "chore: changelog for v${PULUMI_VERSION}"

          # Update go module dependencies
          (
            cd pkg
            go get -u "github.com/pulumi/pulumi/sdk/v3@v${PULUMI_VERSION}"
          )
          make tidy_fix
          git add -A
          git commit -m "chore: post-release go.mod updates"

          git push -u origin HEAD

          # Note that the title of the PR is used in the on-push workflow.  If the title needs to
          # change here, please also check on-push.yml
          PR=$(gh pr create --title "Changelog and go.mod updates for v${PULUMI_VERSION}" --body "")

          if [ "${QUEUE_MERGE}" = "true" ]; then
            gh pr merge --auto --squash "${PR}"
          fi
