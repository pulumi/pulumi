version: "2"
run:
  build-tags:
    - all
linters:
  enable:
    - depguard
    - durationcheck
    - exhaustive
    - forbidigo
    - goheader
    - goprintffuncname
    - gosec
    - importas
    - lll
    - misspell
    - nakedret
    - nolintlint
    - paralleltest
    - perfsprint
    - prealloc
    - revive
    - unconvert
    - usetesting
    - wastedassign
    - whitespace
    - copyloopvar
    - gocritic
    - requiredfield
    - noosexit
  settings:
    custom:
      requiredfield:
        type: module
        description: Checks that required fields are set in struct literals (see go.abhg.dev/requiredfield)
      noosexit:
        type: module
        description: Forbids process-terminating calls (os.Exit, cmdutil.Exit, cmdutil.ExitError) outside of main and TestMain
    usetesting:
      os-temp-dir: true
      context-background: true
      context-todo: true
    gocritic:
      disabled-checks:
        - appendAssign
        - argOrder
        - badCall
        - badCond
        - caseOrder
        - codegenComment
        - deprecatedComment
        - dupArg
        - dupCase
        - dupSubExpr
        - exitAfterDefer
        - flagDeref
        - flagName
        - mapKey
        - offBy1
        - sloppyLen
        - sloppyTypeAssert
        - assignOp
        - captLocal
        - commentFormatting
        - defaultCaseOrder
        - elseif
        - ifElseChain
        - newDeref
        - regexpMust
        - singleCaseSwitch
        - switchTrue
        - typeSwitchVar
        - underef
        - unlambda
        - unslice
        - valSwap
        - wrapperFunc
      enabled-checks:
        - ruleguard
      settings:
        ruleguard:
          rules: '${config-path}/.golangci/rules.go'
          failOn: dsl,import
    depguard:
      rules:
        protobuf:
          deny:
            - pkg: github.com/golang/protobuf
              desc: Use google.golang.org/protobuf instead
        pkg-no-sdk-plugin:
          files:
            - '**/pkg/**/*.go'
          deny:
            - pkg: github.com/pulumi/pulumi/sdk/v3/go/common/resource/plugin
              desc: The pkg module must not import sdk/go/common/resource/plugin
    goheader:
      values:
        regexp:
          COPYRIGHT_YEARS: \d{4}
          WHITESPACE: '[ ]{4}'
      template: |-
        Copyright {{ COPYRIGHT_YEARS }}, Pulumi Corporation.

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

        {{ WHITESPACE }}http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.
    gosec:
      excludes:
        # Taint analysis rules produce excessive false positives in a CLI
        # tool where virtually all file and command operations use
        # user-provided paths.
        - G115 # Integer overflow conversion via taint analysis
        - G117 # Marshaled struct field matches secret pattern
        - G122 # Filesystem TOCTOU in filepath.Walk callbacks
        - G204 # Subprocess launched with tainted input
        - G602 # Slice index out of range via taint analysis
        - G701 # SQL injection via taint analysis
        - G702 # Command injection via taint analysis
        - G703 # Path traversal via taint analysis
        - G704 # SSRF via taint analysis
    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite
    importas:
      alias:
        - pkg: github.com/pulumi/pulumi/sdk/v3/proto/go
          alias: pulumirpc
        - pkg: github.com/pulumi/pulumi/sdk/v3/proto/go/testing
          alias: testingrpc
        - pkg: github.com/deckarep/golang-set/v2
          alias: mapset
        - pkg: github.com/pulumi/pulumi/sdk/v3/go/common/testing
          alias: ptesting
    nakedret:
      max-func-lines: 60
    nolintlint:
      allow-unused: true
    forbidigo:
      forbid:
        - pattern: ^assert.NoError$
          msg: Use require.NoError instead
        - pattern: ^assert.NotNil$
          msg: Use require.NotNil instead
        - pattern: ^assert.Len$
          msg: Use require.Len instead
        - pattern: ^resource.New(String|Bool|Number|Array|Asset|Archive|Object|Computed|Output|Secret|ResourceReference)Property$
          msg: Use resource.NewProperty instead
        - pattern: ^os.Rename$
          msg: "`os.Rename` does not work across file systems and is not atomic for windows. Use with caution"
        # Scoped to non-test code under pkg/cmd/ via exclusion rules below.
        # Cobra commands should use cmd.OutOrStdout() / cmd.ErrOrStderr() so
        # output can be captured, redirected, or tested.
        - pattern: ^os\.Stdout$
          msg: "use cmd.OutOrStdout() instead of os.Stdout in pkg/cmd"
        - pattern: ^os\.Stderr$
          msg: "use cmd.ErrOrStderr() instead of os.Stderr in pkg/cmd"
        - pattern: ^fmt\.Print(f|ln)?$
          msg: "use fmt.Fprint*(cmd.OutOrStdout(), ...) instead of fmt.Print* in pkg/cmd"
        - pattern: ^logging\.V$
          msg: "use log/slog directly instead of the logging wrapper (slog migration)"
        - pattern: ^logging\.(Infof|Warningf|Errorf)$
          msg: "use log/slog directly instead of the logging wrapper (slog migration)"
    revive:
      rules:
        - name: use-any
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        text: 'unused-parameter: parameter \S+ seems to be unused, consider removing or renaming it as _'
      - linters:
          - revive
        text: 'empty-block: this block is empty, you can remove it'
      - linters:
          - revive
        text: 'redefines-builtin-id: redefinition of the built-in function new'
      - path: (.+)\.go$
        text: 'Name is deprecated: Name returns the variable or declaration name of the resource'
      - path: (.+)\.go$
        text: '"github.com/golang/protobuf/[\w/]+" is deprecated'
      - path: (.+)\.go$
        text: strings.Title has been deprecated
      - path: (.+)\.go$
        text: 'deprecated: Please use types in:? cloud.google.com/go/logging/apiv2/loggingpb'
      - linters:
          - staticcheck
        text: 'error strings should not end with punctuation or newlines'
      - linters:
          - staticcheck
        text: 'error strings should not be capitalized'
      - linters:
          - staticcheck
        text: 'is being imported more than once'
      - linters:
          - staticcheck
        text: 'other import of'
      - linters:
          - goheader
        path: pkg/cmd/pulumi/logs/timestamp\.go$
      # Scope the cmd.OutOrStdout/ErrOrStderr/fmt.Fprint* forbidigo rules to
      # non-test code under pkg/cmd/. Paths reported by golangci-lint are
      # relative to the repo root regardless of which module is being linted.
      - linters:
          - gosec
        path: _test\.go$
        text: 'G101:'
      - linters:
          - forbidigo
        path-except: ^pkg/cmd/
        text: 'use (cmd\.OutOrStdout|cmd\.ErrOrStderr|fmt\.Fprint\*)'
      - linters:
          - forbidigo
        path-except: ^(pkg/util/nosleep|pkg/host|pkg/pluginstorage|pkg/cmd/pulumi)/
        text: 'logging wrapper \(slog migration\)'
      - linters:
          - forbidigo
        path: _test\.go$
        text: 'use (cmd\.OutOrStdout|cmd\.ErrOrStderr|fmt\.Fprint\*)'
    paths:
      - Godeps$
      - builtin$
      - node_modules
      - testdata$
      - third_party$
      - vendor$
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - Godeps$
      - builtin$
      - compilation_error
      - node_modules
      - testdata$
      - third_party$
      - vendor$
