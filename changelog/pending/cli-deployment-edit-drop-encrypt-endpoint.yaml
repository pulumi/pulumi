body: '`pulumi deployment settings edit --secret-env` no longer makes a separate call to the deployment-settings encrypt endpoint per secret. Secret env vars are now sent to the PATCH deployment-settings endpoint, which encrypts them server-side, removing a round-trip per secret.'
